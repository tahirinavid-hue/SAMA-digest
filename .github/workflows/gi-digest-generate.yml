name: GI Digest — Generate Preview

on:
  schedule:
    - cron: "0 11 * * 6"  # Saturdays at 11am UTC (7am ET)
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Test mode — welcome emails skipped"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync subscribers
        env:
          JOTFORM_API_KEY: ${{ secrets.JOTFORM_API_KEY }}
        run: python scripts/sync_gi_subscribers.py

      - name: Persist subscriber state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gi_subscribers.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update subscriber state [skip ci]"
          git push

      - name: Generate digest & send preview to admin
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FORCE_SEND: "true"
          PREVIEW_ONLY: "true"
        run: python scripts/run_gi_digest.py

      - name: Save digest draft to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gi_last_digest.html 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: save digest draft for review [skip ci]"
          git push
