name: GI Community Digest

on:
  schedule:
    - cron: "0 12 * * 1"  # Mondays at 12pm UTC (8am ET)
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync subscribers & send welcome emails
        env:
          JOTFORM_API_KEY: ${{ secrets.JOTFORM_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python scripts/sync_gi_subscribers.py

      - name: Run GI community digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python scripts/run_gi_digest.py
