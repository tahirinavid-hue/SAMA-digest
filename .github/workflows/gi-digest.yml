name: GI Community Digest

on:
  schedule:
    - cron: "0 12 * * 6"  # Saturdays at 12pm UTC (8am ET)
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Test mode — send to admin only (tahirinavid@gmail.com)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync subscribers & send welcome emails
        env:
          JOTFORM_API_KEY: ${{ secrets.JOTFORM_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python scripts/sync_gi_subscribers.py

      - name: Persist subscriber state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gi_subscribers.txt gi_welcomed.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update subscriber state [skip ci]"
          git push

      - name: Run GI community digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
          TEST_MODE: ${{ inputs.test_mode && 'true' || 'false' }}
        run: python scripts/run_gi_digest.py
